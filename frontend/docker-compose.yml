version: "3.9"

services:
  react-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - .:/app
      - /app/node_modules
    command: 
      npm run dev        