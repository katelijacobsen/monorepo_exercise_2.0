version: "3.9"

services:
  react-app:
    build: 
      context: ..
      dockerfile: dev/Dockerfile.dev
    container_name: wash_world
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next